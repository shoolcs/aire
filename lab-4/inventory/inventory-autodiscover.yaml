apiVersion: agentregistry.dev/v1alpha1
kind: DiscoveryConfig
metadata:
  name: local-cluster-discovery
  namespace: agentregistry
spec:
  environments:
    - name: local
      cluster:
        name: local
      provider: local
      discoveryEnabled: true
      deployEnabled: false
      namespaces: [kagent]
      resourceTypes: [MCPServer, Agent, ModelConfig, RemoteMCPServer]
