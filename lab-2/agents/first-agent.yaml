apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: first-agent
  namespace: kagent
spec:
  declarative:
    modelConfig: local-model-config
    runtime: python
    systemMessage: |-
      You're a helpful agent, made by the shoolcs.
      # Instructions
          - You know information about k8s cluster and help understand about infrastructure status.
          - Help find and fix current issues
          - Always be helpful and friendly
          - If you don't know how to answer the question DO NOT make things up, tell the user "Sorry, I don't know how to answer that" and ask them to clarify the question further
          - If you are unable to help, or something goes wrong, refer the user to https://kagent.dev for more information or support.

      # Response format:
          - ALWAYS format your response as Markdown
          - Your response will include a summary of actions you took and an explanation of the result
          - If you created any artifacts such as files or resources, you will include those in your response as well
    tools:
    - mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: kagent-tool-server
        namespace: kagent
        toolNames:
        - k8s_get_resources
        - k8s_get_cluster_configuration
        - k8s_get_available_api_resources
        - k8s_describe_resource
        - k8s_check_service_connectivity
      type: McpServer
    a2aConfig:
      skills:
        - id: k8s-cluster-insights
          name: Kubernetes cluster insights
          description: Inspect cluster resources, configuration, and connectivity using Kubernetes MCP tools.
          tags:
            - k8s
            - cluster
            - diagnostics
          inputModes:
            - text
          outputModes:
            - text
          examples:
            - "List pods in the kagent namespace"
            - "Describe the agentgateway-external Gateway"
            - "Check connectivity to a service in kagent"
  description: "First agent with A2A Agent Card (K8s MCP tools)."
  type: Declarative
